<svg viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="700" fill="#f5f5f5"/>

  <!-- Header -->
  <rect width="600" height="80" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="20" y="35" font-size="18" font-weight="bold" fill="#333">월간 실적 보고서</text>
  <text x="20" y="60" font-size="12" fill="#999">2026년 7월 마케팅팀</text>

  <!-- AI Summary Section -->
  <rect x="15" y="100" width="570" height="140" fill="#e8f4fd" stroke="#4ca3f5" stroke-width="2" rx="8"/>
  <circle cx="35" cy="125" r="10" fill="#4ca3f5"/>
  <text x="55" y="132" font-size="12" font-weight="bold" fill="#4ca3f5">✨ AI 요약</text>
  <rect x="450" y="118" width="90" height="20" fill="#ffeaa7" rx="3"/>
  <text x="460" y="132" font-size="10" fill="#d63031" font-weight="bold">자동 생성됨</text>

  <text x="25" y="160" font-size="13" fill="#333" font-weight="bold">이번 달 마케팅팀은 3개 캠페인을 진행했으며,</text>
  <text x="25" y="180" font-size="13" fill="#333">총 25만 명의 도달률을 기록했습니다. SNS 참여도가</text>
  <text x="25" y="200" font-size="13" fill="#333">전월 대비 18% 증가했고, 이메일 오픈율은 28%입니다.</text>
  <text x="25" y="220" font-size="13" fill="#333">예산 집행률은 92%입니다.</text>

  <!-- Data Section -->
  <text x="20" y="270" font-size="13" font-weight="bold" fill="#333">상세 데이터</text>
  <rect x="450" y="260" width="90" height="25" fill="white" stroke="#ddd" stroke-width="1" rx="4"/>
  <text x="465" y="278" font-size="11" fill="#666">펼치기</text>

  <!-- Data Table -->
  <rect x="15" y="295" width="570" height="120" fill="white" stroke="#ddd" stroke-width="1" rx="4"/>
  <line x1="15" y1="320" x2="585" y2="320" stroke="#eee" stroke-width="1"/>
  <line x1="15" y1="345" x2="585" y2="345" stroke="#eee" stroke-width="1"/>
  <line x1="15" y1="370" x2="585" y2="370" stroke="#eee" stroke-width="1"/>

  <text x="25" y="315" font-size="12" fill="#999">캠페인 A</text>
  <text x="450" y="315" font-size="12" fill="#333" text-anchor="end">127,000 도달</text>

  <text x="25" y="340" font-size="12" fill="#999">캠페인 B</text>
  <text x="450" y="340" font-size="12" fill="#333" text-anchor="end">98,500 도달</text>

  <text x="25" y="365" font-size="12" fill="#999">캠페인 C</text>
  <text x="450" y="365" font-size="12" fill="#333" text-anchor="end">24,200 도달</text>

  <text x="25" y="395" font-size="12" fill="#333" font-weight="bold">SNS 참여도</text>
  <text x="450" y="395" font-size="12" fill="#333" font-weight="bold" text-anchor="end">+18%</text>

  <!-- Buttons -->
  <rect x="15" y="430" width="180" height="40" fill="#178eff" rx="6"/>
  <text x="105" y="458" font-size="13" fill="white" font-weight="bold" text-anchor="middle">이 요약 사용</text>

  <rect x="205" y="430" width="180" height="40" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="295" y="458" font-size="13" fill="#333" font-weight="bold" text-anchor="middle">다시 생성</text>

  <rect x="395" y="430" width="50" height="40" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="420" y="458" font-size="18" fill="#999" text-anchor="middle">⋮</text>

  <!-- Info Box -->
  <rect x="15" y="490" width="570" height="80" fill="#fff9e6" stroke="#f39c12" stroke-width="1" rx="4"/>
  <line x1="25" y1="495" x2="25" y2="560" stroke="#f39c12" stroke-width="3"/>
  <text x="40" y="515" font-size="12" font-weight="bold" fill="#d68910">참고:</text>
  <text x="40" y="535" font-size="11" fill="#8b6914">AI 요약은 제공 목적이며, 정확성 검증은</text>
  <text x="40" y="552" font-size="11" fill="#8b6914">팀장 승인이 필요합니다.</text>

  <!-- Footer note -->
  <text x="300" y="680" font-size="10" fill="#999" text-anchor="middle">※ 이 화면은 시뮬레이션 예시입니다</text>
</svg>