<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="800" fill="#f5f5f5"/>

  <!-- Header -->
  <rect width="600" height="80" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="20" y="35" font-size="18" font-weight="bold" fill="#333">휴가 신청 현황</text>
  <text x="20" y="60" font-size="12" fill="#999">2026년 연차 및 휴가 관리</text>

  <!-- Summary Cards -->
  <rect x="15" y="100" width="170" height="90" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="25" y="125" font-size="11" fill="#999">연차 잔여</text>
  <text x="25" y="155" font-size="22" font-weight="bold" fill="#333">12일</text>

  <rect x="215" y="100" width="170" height="90" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="225" y="125" font-size="11" fill="#999">휴직 잔여</text>
  <text x="225" y="155" font-size="22" font-weight="bold" fill="#333">5일</text>

  <rect x="415" y="100" width="170" height="90" fill="white" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="425" y="125" font-size="11" fill="#999">이월 예정</text>
  <text x="425" y="155" font-size="22" font-weight="bold" fill="#333">3일</text>

  <!-- Action Buttons Section -->
  <text x="20" y="220" font-size="13" font-weight="bold" fill="#333">휴가 신청</text>
  <rect x="15" y="235" width="137" height="35" fill="white" stroke="#999" stroke-width="1" rx="4"/>
  <text x="83" y="260" font-size="12" fill="#333" text-anchor="middle">연차 신청</text>

  <rect x="162" y="235" width="137" height="35" fill="white" stroke="#999" stroke-width="1" rx="4"/>
  <text x="230" y="260" font-size="12" fill="#333" text-anchor="middle">휴직 신청</text>

  <rect x="309" y="235" width="137" height="35" fill="white" stroke="#999" stroke-width="1" rx="4"/>
  <text x="377" y="260" font-size="12" fill="#333" text-anchor="middle">특별휴가</text>

  <rect x="456" y="235" width="137" height="35" fill="white" stroke="#999" stroke-width="1" rx="4"/>
  <text x="524" y="260" font-size="12" fill="#333" text-anchor="middle">병가 신청</text>

  <!-- Management Section -->
  <text x="20" y="300" font-size="13" font-weight="bold" fill="#333">휴가 관리</text>
  <rect x="15" y="315" width="107" height="30" fill="white" stroke="#999" stroke-width="1" rx="4"/>
  <text x="68" y="336" font-size="11" fill="#333" text-anchor="middle">신청 내역</text>

  <rect x="132" y="315" width="107" height="30" fill="white" stroke="#999" stroke-width="1" rx="4"/>
  <text x="185" y="336" font-size="11" fill="#333" text-anchor="middle">승인 대기</text>

  <rect x="249" y="315" width="107" height="30" fill="white" stroke="#999" stroke-width="1" rx="4"/>
  <text x="302" y="336" font-size="11" fill="#333" text-anchor="middle">취소 신청</text>

  <rect x="366" y="315" width="107" height="30" fill="white" stroke="#999" stroke-width="1" rx="4"/>
  <text x="419" y="336" font-size="11" fill="#333" text-anchor="middle">연차 조정</text>

  <!-- Recent Requests Table -->
  <text x="20" y="380" font-size="13" font-weight="bold" fill="#333">최근 신청</text>

  <rect x="15" y="395" width="570" height="25" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="25" y="414" font-size="11" font-weight="bold" fill="#666">신청일</text>
  <text x="150" y="414" font-size="11" font-weight="bold" fill="#666">유형</text>
  <text x="260" y="414" font-size="11" font-weight="bold" fill="#666">기간</text>
  <text x="440" y="414" font-size="11" font-weight="bold" fill="#666" text-anchor="middle">상태</text>

  <line x1="15" y1="420" x2="585" y2="420" stroke="#eee" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="15" y="420" width="570" height="45" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="25" y="448" font-size="12" fill="#333">2026-07-10</text>
  <text x="150" y="448" font-size="12" fill="#333">연차</text>
  <text x="260" y="448" font-size="12" fill="#333">7/13 ~ 7/17</text>
  <rect x="430" y="435" width="60" height="20" fill="#d4edda" rx="3"/>
  <text x="460" y="448" font-size="10" fill="#155724" font-weight="bold" text-anchor="middle">승인</text>

  <!-- Row 2 -->
  <rect x="15" y="465" width="570" height="45" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="25" y="493" font-size="12" fill="#333">2026-06-28</text>
  <text x="150" y="493" font-size="12" fill="#333">휴직</text>
  <text x="260" y="493" font-size="12" fill="#333">7/1 ~ 7/5</text>
  <rect x="430" y="480" width="60" height="20" fill="#fff3cd" rx="3"/>
  <text x="460" y="493" font-size="10" fill="#856404" font-weight="bold" text-anchor="middle">대기</text>

  <!-- Problem Annotations -->
  <g opacity="0.8">
    <circle cx="550" cy="140" r="4" fill="#ff6b6b"/>
    <line x1="554" y1="140" x2="575" y2="140" stroke="#ff6b6b" stroke-width="2"/>
    <text x="580" y="145" font-size="10" fill="#ff6b6b">버튼 너무 많음</text>

    <circle cx="300" cy="235" r="4" fill="#ff6b6b"/>
    <line x1="300" y1="210" x2="300" y2="190" stroke="#ff6b6b" stroke-width="2"/>
    <text x="280" y="180" font-size="10" fill="#ff6b6b">어디를 누르지?</text>

    <circle cx="100" cy="155" r="4" fill="#ff6b6b"/>
    <line x1="100" y1="180" x2="100" y2="200" stroke="#ff6b6b" stroke-width="2"/>
    <text x="60" y="215" font-size="10" fill="#ff6b6b">정보 많음</text>
  </g>

  <!-- Footer note -->
  <text x="300" y="790" font-size="10" fill="#999" text-anchor="middle">※ 이 화면은 시뮬레이션 예시입니다</text>
</svg>